    <style>
        :root {
            --red: #E8232A;
            --red-dark: #C41E24;
            --bg-light: #F8F9FC;
            --card-bg: #ffffff;
            --card-border: #E5E7EB;
            --text-color: #1A1A2E;
            --text-muted: #6B7280;
            --font: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: linear-gradient(135deg, #F8F9FC 0%, #FFFFFF 50%, #F3F4F6 100%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(232, 35, 42, 0.05) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(37, 211, 102, 0.04) 0%, transparent 70%);
            bottom: 10%;
            right: 10%;
            pointer-events: none;
            z-index: 0;
        }

        .ty-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 48px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 580px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(26, 26, 46, 0.08);
            position: relative;
            z-index: 1;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-icon-wrap {
            width: 80px;
            height: 80px;
            background: rgba(37, 211, 102, 0.1);
            border: 2px solid rgba(37, 211, 102, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            position: relative;
            animation: pulseGlow 2s infinite;
        }

        .success-icon-wrap i {
            color: #25D366;
            font-size: 32px;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.4);
            }
            70% {
                box-shadow: 0 0 0 16px rgba(37, 211, 102, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
            }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 12px;
            color: var(--text-color);
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        p strong {
            color: var(--red);
        }

        .redirect-box {
            background: #F8F9FC;
            border: 1px solid #E5E7EB;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 36px;
        }

        .redirect-text {
            font-size: 0.9rem;
            font-weight: 600;
            color: #25D366;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #E5E7EB;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--red) 0%, var(--red-dark) 100%);
            border-radius: 10px;
            transition: width 0.1s linear;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            border: none;
        }

        .btn-whatsapp {
            background: #25D366;
            color: #ffffff;
            box-shadow: 0 8px 24px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background: #20ba59;
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(37, 211, 102, 0.4);
        }

        .btn-home {
            background: #F3F4F6;
            color: var(--text-color);
            border: 1px solid #E5E7EB;
        }

        .btn-home:hover {
            background: #E5E7EB;
            transform: translateY(-2px);
            border-color: #D1D5DB;
        }

        @media(max-width: 480px) {
            .ty-card {
                padding: 36px 24px;
            }
            h1 {
                font-size: 1.8rem;
            }
            p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="ty-card">
        <div class="success-icon-wrap" aria-hidden="true">
            <i class="fa-solid fa-check"></i>
        </div>
        <h1>Submission Successful!</h1>
        <p>Thank you for choosing <strong>Creatix Institute Jaipur</strong>. Your inquiry has been securely received. Please click the button below to send your details directly on WhatsApp and start your counseling session immediately.</p>

        <div class="btn-group">
            <a id="tyWaBtn" href="#" class="btn btn-whatsapp">
                <i class="fa-brands fa-whatsapp"></i> Send Details on WhatsApp
            </a>
            <a href="index.html" class="btn btn-home">
                <i class="fa-solid fa-arrow-left"></i> Back to Homepage
            </a>
        </div>
    </div>

    <script>
        // Parse url search parameters
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name') || '';
        const phone = urlParams.get('phone') || '';
        const course = urlParams.get('course') || '';
        const msg = urlParams.get('msg') || `Hello Creatix! 👋\n\nI am interested in learning more about courses at Creatix Institute Jaipur.\n\nKindly guide me.`;

        const waUrl = `https://wa.me/918854800811?text=${encodeURIComponent(msg)}`;

        // Set WhatsApp button href
        const waBtn = document.getElementById('tyWaBtn');
        if (waBtn) waBtn.href = waUrl;

        // Trigger Google Ads conversion tracking
        if (typeof gtag === 'function') {
            gtag('event', 'conversion', {
                'send_to': 'AW-17490688136',
                'value': 1.0,
                'currency': 'INR'
            });
        }

        // Trigger Facebook Pixel Lead tracking
        if (typeof fbq === 'function') {
            fbq('track', 'Lead', {
                content_name: course,
                status: 'Success'
            });
        }
    </script>
</body>
</html>
